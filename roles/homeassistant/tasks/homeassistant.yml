---
- name: Start homeassistant
  block:
    - name: Ensure directories exist
      become: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ homeassistant_user_id }}"
        group: "{{ homeassistant_group_id }}"
        mode: '{{ (ansible_facts[item].stat.mode | default(omit)) | default("0755", true) }}'
      with_items:
        - "{{ homeassistant_data_directory }}"
        - "{{ homeassistant_zigbee2mqtt_data_directory }}"
      when: not homeassistant_zigbee2mqtt_enabled | bool

    - name: Ensure directories exist (zigbee2mqtt)
      become: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ homeassistant_user_id }}"
        group: "{{ homeassistant_group_id }}"
        mode: '{{ (ansible_facts[item].stat.mode | default(omit)) | default("0755", true) }}'
      with_items:
        - "{{ homeassistant_data_directory }}"
        - "{{ homeassistant_zigbee2mqtt_data_directory }}"
      when: homeassistant_zigbee2mqtt_enabled | bool

    - name: Copy Docker Compose template
      template:
        src: docker-compose.yaml.j2
        dest: "{{ homeassistant_compose_file }}"

    - name: Start homeassistant
      community.docker.docker_compose_v2:
        project_src: "{{ homeassistant_data_directory }}"
        state: present        
  when: homeassistant_enabled is true

- name: Stop homeassistant
  block:
    - name: Stop homeassistant
      community.docker.docker_container:
        name: "{{ homeassistant_container_name }}"
        state: absent
  when: homeassistant_enabled is false

- name: Stop homeassistant
  block:
    - name: Stop homeassistant
      community.docker.docker_container:
        name: "{{ homeassistant_container_name }}"
        state: absent
  when: homeassistant_matter_enabled is false

- name: Stop homeassistant
  block:
    - name: Stop homeassistant
      community.docker.docker_container:
        name: "{{ homeassistant_container_name }}"
        state: absent
  when: homeassistant_thread_border_router_enabled is false  