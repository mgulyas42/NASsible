---
# enable or disable the application
node_red_enabled: false

# directories
node_red_data_directory: "{{ docker_home }}/node-red"
node_red_config_directory: "{{ node_red_data_directory }}/data"

# network
node_red_hostname: "node-red"
node_red_port: "1880"
node_red_network_name: docker_network

# docker
node_red_compose_file: "{{ node_red_data_directory }}/docker-compose.yaml"
node_red_container_name: "node-red"
node_red_image_name: "nodered/node-red"
node_red_image_version: "latest"
node_red_user_id: "{{ default_owner }}"
node_red_group_id: "{{ default_group }}"

# specs
node_red_memory: "1g"
node_red_cpu: 1
